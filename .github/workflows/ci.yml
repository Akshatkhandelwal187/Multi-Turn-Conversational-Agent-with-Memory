name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (dev extra — no torch, fully offline)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Format check (ruff)
        run: ruff format --check src tests

      - name: Type-check (mypy)
        run: mypy src

      - name: Test with coverage
        # Live Hugging Face tests auto-skip without HUGGINGFACEHUB_API_TOKEN.
        run: pytest --cov=aria --cov-report=term-missing --cov-fail-under=70

      - name: Memory ablation (smoke)
        run: python -m aria.eval.runner --scenarios 4 --no-charts --out /tmp/eval_reports
